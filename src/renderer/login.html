<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>UpNod — Sign In</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: transparent;
      color: #e2e8f0;
      height: 100vh;
      overflow: hidden;
      user-select: none;
    }
    #app {
      background: rgba(15,15,25,0.85);
      border: 1px solid rgba(99,179,237,0.15);
      border-radius: 14px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      backdrop-filter: blur(8px);
      overflow: hidden;
    }
    #titlebar {
      -webkit-app-region: drag;
      background: transparent;
      padding: 8px 10px;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      flex-shrink: 0;
    }
    .win-btns {
      -webkit-app-region: no-drag;
      display: flex;
      gap: 6px;
    }
    .win-btn {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      font-size: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.2s;
    }
    .win-btn:hover { opacity: 0.8; }
    .btn-close { background: #fc5c65; color: #7a0000; }
    .btn-min { background: #fed330; color: #7a5500; }

    /* Mini-mode: only show the yellow restore button */
    #mini-restore-btn {
      display: none;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      border: none;
      background: #fed330;
      color: #7a5500;
      font-size: 18px;
      cursor: pointer;
      align-items: center;
      justify-content: center;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 2px 8px rgba(0,0,0,0.4);
    }
    #mini-restore-btn:hover { transform: scale(1.1); box-shadow: 0 4px 16px rgba(254,211,48,0.5); }
    body.mini-mode #app { display: none !important; }
    body.mini-mode #mini-restore-btn { display: flex; }
    body.mini-mode { background: transparent; overflow: hidden; }

    #content {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(99,179,237,0.15);
      border-radius: 14px;
      padding: 32px 28px;
      width: 100%;
      max-width: 360px;
      text-align: center;
    }
    .icon { font-size: 40px; margin-bottom: 12px; }
    h1 { font-size: 20px; color: #63b3ed; margin-bottom: 4px; }
    .subtitle { font-size: 12px; color: #718096; margin-bottom: 24px; }
    .btn {
      width: 100%;
      padding: 12px;
      border: none;
      color: white;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 12px;
    }
    .btn:hover { opacity: 0.9; transform: scale(1.02); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .btn-primary {
      background: linear-gradient(135deg, #4299e1, #3182ce);
      box-shadow: 0 2px 12px rgba(66,153,225,0.25);
    }
    .btn-green {
      background: linear-gradient(135deg, #48bb78, #38a169);
      box-shadow: 0 2px 12px rgba(72,187,120,0.25);
    }
    .divider {
      font-size: 11px;
      color: #4a5568;
      margin: 8px 0 4px;
    }
    .info-text {
      font-size: 11px;
      color: #4a5568;
      line-height: 1.5;
      margin-top: 16px;
    }
    .status-msg {
      margin-top: 12px;
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 12px;
      display: none;
    }
    .status-msg.waiting {
      display: block;
      background: rgba(66,153,225,0.12);
      border: 1px solid rgba(66,153,225,0.25);
      color: #63b3ed;
    }
    .status-msg.error {
      display: block;
      background: rgba(252,92,101,0.12);
      border: 1px solid rgba(252,92,101,0.3);
      color: #fc8181;
    }
    .status-msg.success {
      display: block;
      background: rgba(72,187,120,0.12);
      border: 1px solid rgba(72,187,120,0.3);
      color: #68d391;
    }
  </style>
</head>
<body>
  <button id="mini-restore-btn" onclick="ipcRenderer.send('restore-window')" title="Restore">&#9744;</button>
  <div id="app">
    <div id="titlebar">
      <div class="win-btns">
        <button class="win-btn btn-min" onclick="ipcRenderer.send('minimize-window')" title="Minimize">━</button>
        <button class="win-btn btn-close" onclick="ipcRenderer.send('close-app')" title="Close">✕</button>
      </div>
    </div>

    <div id="content">
      <div class="card">
        <div class="icon" style="font-size:0; background:none;">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 36" width="140" height="50"><text x="0" y="26" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="24" font-weight="800" letter-spacing="-0.5"><tspan fill="#3b82f6">Up</tspan><tspan fill="#ffffff">Nod</tspan></text></svg>
        </div>
        <p class="subtitle">Your AI interview co-pilot</p>

        <button class="btn btn-primary" id="login-btn" onclick="handleLogin()">Sign In with Browser</button>
        <p class="divider">or</p>
        <button class="btn btn-green" id="register-btn" onclick="handleRegister()">Create Free Account</button>

        <p class="info-text">
          A browser window will open for secure authentication. You'll return to the app automatically after signing in.
        </p>
        <div id="status-msg" class="status-msg"></div>
      </div>
    </div>
  </div>

<script>
  const { ipcRenderer } = require('electron');

  // ── Mini-mode listener ──
  ipcRenderer.on('mini-mode', function(_event, isMini) {
    if (isMini) {
      document.body.classList.add('mini-mode');
    } else {
      document.body.classList.remove('mini-mode');
    }
  });

  function setStatus(msg, type) {
    const el = document.getElementById('status-msg');
    el.textContent = msg;
    el.className = 'status-msg ' + type;
  }

  function handleLogin() {
    const btn = document.getElementById('login-btn');
    btn.disabled = true;
    btn.textContent = 'Waiting for browser…';
    setStatus('Opening browser for sign in…', 'waiting');
    ipcRenderer.send('open-browser-login');

    setTimeout(() => {
      if (btn.disabled) {
        btn.disabled = false;
        btn.textContent = 'Sign In with Browser';
        setStatus('Browser opened. Sign in to continue, or click to try again.', 'waiting');
      }
    }, 3000);
  }

  function handleRegister() {
    const btn = document.getElementById('register-btn');
    btn.disabled = true;
    btn.textContent = 'Opening browser…';
    setStatus('Opening browser for registration…', 'waiting');
    ipcRenderer.send('open-browser-register');

    setTimeout(() => {
      if (btn.disabled) {
        btn.disabled = false;
        btn.textContent = 'Create Free Account';
      }
    }, 3000);
  }

  ipcRenderer.on('auth-callback-success', () => {
    setStatus('Authenticated! Loading app…', 'success');
    document.getElementById('login-btn').disabled = true;
    document.getElementById('register-btn').disabled = true;
    setTimeout(() => {
      window.location.href = 'index.html';
    }, 500);
  });

  ipcRenderer.on('auth-callback-error', (_event, msg) => {
    setStatus(msg || 'Authentication failed. Please try again.', 'error');
    document.getElementById('login-btn').disabled = false;
    document.getElementById('register-btn').disabled = false;
  });

  (async function checkAuth() {
    try {
      const user = await ipcRenderer.invoke('auth:getCurrentUser');
      if (user) {
        window.location.href = 'index.html';
        return;
      }
    } catch {}

    // If user just explicitly signed out, skip auto-login so they can switch accounts.
    const didLogout = await ipcRenderer.invoke('auth:isJustLoggedOut');
    if (didLogout) {
      setStatus('Signed out. Sign in to continue.', 'waiting');
      return;
    }

    // No local session — try auto-login via browser session.
    // Opens /desktop-auth which checks for existing browser tokens.
    // If found, redirects back via interview-assistant://callback protocol.
    // If not found, redirects to /login?desktop=1 for manual sign-in.
    setStatus('Checking for existing session…', 'waiting');
    ipcRenderer.send('open-browser-login');
  })();
</script>
</body>
</html>
