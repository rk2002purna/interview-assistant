##
## Nginx config for ai-assistant.referconnect.in
##
## Layout:
##   /          → web-app static files (React SPA)
##   /admin     → admin-dashboard static files (React SPA)
##   /api       → backend Node.js server (Hono, port 8787)
##   /webhooks  → backend Node.js server (Razorpay webhooks)
##
## Prerequisites:
##   1. Copy web-app/dist/* to /var/www/ai-assistant/web/
##   2. Copy admin-dashboard/dist/* to /var/www/ai-assistant/admin/
##   3. Backend running on localhost:8787
##   4. SSL certificate via Certbot:
##      sudo certbot --nginx -d ai-assistant.referconnect.in
##

server {
    listen 80;
    server_name ai-assistant.referconnect.in;

    # Redirect all HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name ai-assistant.referconnect.in;

    # --- SSL (managed by Certbot, will be auto-updated) ---
    ssl_certificate     /etc/letsencrypt/live/ai-assistant.referconnect.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ai-assistant.referconnect.in/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # --- Security headers ---
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # --- API proxy → backend (Node.js / Hono) ---
    location /api/ {
        proxy_pass         http://127.0.0.1:8787/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 120s;
    }

    # --- Razorpay webhooks → backend ---
    location /webhooks/ {
        proxy_pass         http://127.0.0.1:8787/webhooks/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # --- Admin Dashboard (React SPA) ---
    location /admin {
        alias /var/www/ai-assistant/admin;
        try_files $uri $uri/ /admin/index.html;

        # Cache assets (hashed filenames) aggressively
        location ~* /admin/assets/ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # --- Web App (React SPA) — catch-all ---
    location / {
        root /var/www/ai-assistant/web;
        try_files $uri $uri/ /index.html;

        # Cache hashed assets aggressively
        location ~* /assets/ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
}
